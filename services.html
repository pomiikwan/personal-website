            theme: {
                extend: {

                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                        card: 'hsl(var(--card))',
                        border: 'hsl(var(--border))',

            --finance-gold: 45 95% 55%;
            --tactical-green: 150 60% 40%;

        body { background: hsl(var(--background)); color: hsl(var(--foreground)); }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 1px, transparent 1px, transparent 2px); z-index: 1; }
        .corner-deco::before { content: ''; position: absolute; top: 0; left: 0; width: 16px; height: 16px; border-top: 2px solid hsl(var(--tech-cyan)); border-left: 2px solid hsl(var(--tech-cyan)); }
        .corner-deco::after { content: ''; position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; border-bottom: 2px solid hsl(var(--tech-cyan)); border-right: 2px solid hsl(var(--tech-cyan)); }
        .gradient-text { background: linear-gradient(to right, hsl(var(--tech-cyan)), hsl(var(--finance-gold))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .container-custom { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
        @media (min-width: 640px) { .container-custom { padding: 0 2rem; } }
        @media (min-width: 1024px) { .container-custom { padding: 0 4rem; } }
        .tech-glow { box-shadow: 0 0 20px hsl(var(--tech-cyan) / 0.3); }
